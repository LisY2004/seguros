<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cliente</title>

       <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Oswald&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
     <link rel="stylesheet" href="/Brocker/static/styles.css">

     <script src="cotizador.js" defer></script>

     <link rel="stylesheet" href="/Brocker/static/styles.css">
    </head>
<body>

    <header>
        <div class="container">
            <div id="branding">
                <h1><span class="highlight">V </span>& </span>F </span>Seguros</h1>
            </div>
            <nav>
                <ul>
                    <li class="current"><a href="verClientes.html">Cliente</a></li>
                    <li><a href="inicioSecion.html">Cerrar Sesión</a></li>


                </ul>
            </nav>
        </div>
    </header>


    <h2>Crear Cliente</h2>
    
    <form action="/clientes/" method="post" enctype="multipart/form-data" style="justify-content: center;">
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombres completos</label>
            <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ingrese sus nombres completos" required>
        </div>

            
        <div class="mb-3">
            <label for="cedula" class="form-label">Cédula de identidad: </label>
            <input type="text" class="form-control" id="cedula" name="cedula" placeholder="Ingrese su cédula de identidad" required>
        </div>
        
        <label>
            <input type="checkbox" name="contratado_asistenciaMedica">
            Asistencia Médica
        </label>

        <div class="mb-3">
            <input type="file" class="form-control" id="seguro_asistenciaMedica" name="seguro_asistenciaMedica" multiple>
        </div>
        <br>
        
        <label>
            <input type="checkbox" name="contratado_seguro_vida">
            Seguro de Vida
        </label>
        <div class="mb-3">
            <input type="file" class="form-control" id="seguro_vida" name="seguro_vida" multiple>
        </div>
        <br>
        
        <label>
            <input type="checkbox" name="contratado_seguro_multihogar">
            Seguro Multihogar
        </label>
        <div class="mb-3">
            <input type="file" class="form-control" id="seguro_multihogar" name="seguro_multihogar" multiple>
        </div>
        
        
        <label>
            <input type="checkbox" name="contratado_seguro_vehiculos">
            Seguro Vehículos
        </label>
        <div class="mb-3">
            <input type="file" class="form-control" id="seguro_vehiculos" name="seguro_vehiculos" multiple>
        </div>
        <br>
        
        <label>
            <input type="checkbox" name="contratado_seguro_PYMES">
            Seguro PYMES
        </label>
        <div class="mb-3">
            <input type="file" class="form-control" id="seguro_PYMES" name="seguro_PYMES" multiple>
        </div>
        <br>
        
        <button type="submit">Crear Cliente</button>
    </form>
</body>
</html>

<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

    /* Estilos generales */
    body {
        min-height: 100vh;
        background: url("https://img.freepik.com/foto-gratis/fondo-abstracto-textura_1258-30714.jpg?semt=ais_hybrid") no-repeat center center/cover;
        position: relative;
        font-family: 'Oswald', sans-serif;
    }

body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(5px);
    z-index: -1;
}

h2 {
    color: #222;
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 30px;
    text-align: center;
    letter-spacing: -0.5px;
    position: relative;
}

h2::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 50px;
    height: 3px;
    background-color: #000;
    border-radius: 3px;
}

form {
    background: rgba(255, 255, 255, 0.9);
    padding: 40px;
    margin-left: 25%;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1), 
                0 1px 3px rgba(0, 0, 0, 0.05),
                0 0 0 1px rgba(255, 255, 255, 0.2) inset;
    width: 100%;
    max-width: 700px;
    border: 1px solid rgba(255, 255, 255, 0.3);
}

.form-group {
    margin-bottom: 25px;
    position: relative;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #333;
}

input[type="text"] {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid rgba(0, 0, 0, 0.1);
    border-radius: 8px;
    font-size: 16px;
    transition: all 0.2s ease;
    background: rgba(255, 255, 255, 0.9);
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03) inset;
}

input[type="text"]:focus {
    border-color: rgba(0, 0, 0, 0.3);
    box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
    outline: none;
}

.insurance-option {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 15px;
    background-color: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(0, 0, 0, 0.05);
    transition: all 0.2s ease;
}

.insurance-option:hover {
    background-color: rgba(255, 255, 255, 0.9);
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
}

.checkbox-container {
    display: flex;
    align-items: center;
    margin-right: 20px;
    min-width: 200px;
}

input[type="checkbox"] {
    margin-right: 10px;
    width: 18px;
    height: 18px;
    cursor: pointer;
}

.file-upload {
    position: relative;
    flex-grow: 1;
}

.file-upload input[type="file"] {
    opacity: 0;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    z-index: 2;
}

.file-upload-label {
    display: block;
    padding: 10px 15px;
    background-color: #f0f0f0;
    border: 1px dashed #ccc;
    border-radius: 6px;
    text-align: center;
    color: #666;
    transition: all 0.2s ease;
    cursor: pointer;
}

.file-upload input[type="file"]:hover + .file-upload-label,
.file-upload input[type="file"]:focus + .file-upload-label {
    background-color: #e8e8e8;
    border-color: #999;
    color: #333;
}

button[type="submit"] {
    background: #000;
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 500;
    letter-spacing: 0.5px;
    display: block;
    width: 100%;
    margin-top: 20px;
    position: relative;
    overflow: hidden;
}

button[type="submit"]::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: 0.5s;
}

button[type="submit"]:hover {
    background: #333;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
}

button[type="submit"]:hover::before {
    left: 100%;
}

button[type="submit"]:active {
    transform: translateY(1px);
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
}

/* Responsive adjustments */
@media (max-width: 768px) {
    form {
        padding: 30px 20px;
    }
    
    .checkbox-container {
        min-width: 100%;
        margin-bottom: 10px;
    }
}
</style>
