<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentos del Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Oswald&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>

    <header>
        <div class="container">
            <div id="branding">
                <h1><span class="highlight">V </span>& </span>F </span>Seguros</h1>
            </div>
            <nav>
                <ul>
                    <li class="current" ><a href="verClientes.html">Cliente</a></li>
                    <li><a href="inicioSecion.html">Cerrar Sesión</a></li>


                </ul>
            </nav>
        </div>
    </header>
    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="text-center mb-4">Documentos del Cliente</h1>
                <div class="d-flex justify-content-end mb-4">
                    <button class="btn btn-volver" onclick="window.location.href='verClientes.html'">
                        <i class="fas fa-arrow-left me-2"></i>Volver a la Lista
                    </button>
                </div>
            </div>
        </div>
        
        <div class="row mb-4">
            <div class="col-12">
                <div id="mensaje" class="alert-container"></div>
            </div>
        </div>
        
        <div class="row mb-5">
            <div class="col-12">
                <div class="info-card" id="infoCliente">
                    <div class="info-card-header">
                        <h2><i class="fas fa-user-circle me-2"></i>Información del Cliente</h2>
                    </div>
                    <div class="info-card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="info-item">
                                    <span class="info-label">Cédula:</span>
                                    <span class="info-value" id="cedula">-</span>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="info-item">
                                    <span class="info-label">Nombre:</span>
                                    <span class="info-value" id="nombre">-</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-12">
                <div class="documents-section" id="documentos">
                    <div class="documents-header">
                        <h2><i class="fas fa-file-alt me-2"></i>Documentos</h2>
                    </div>
                    <div class="table-container">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Tipo de Seguro</th>
                                    <th class="text-center">Contratado</th>
                                    <th class="text-center">Documento</th>
                                </tr>
                            </thead>
                            <tbody id="listaDocumentos">
                                <!-- Los documentos se cargarán aquí dinámicamente -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <script>
        // Obtener la cédula de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const cedula = urlParams.get('cedula');
        
        if (!cedula) {
            mostrarMensaje('error', 'No se especificó la cédula del cliente');
            document.getElementById('infoCliente').style.display = 'none';
            document.getElementById('documentos').style.display = 'none';
        } else {
            document.getElementById('cedula').textContent = cedula;
            cargarDatosCliente(cedula);
        }
        
        // Función para mostrar mensajes
        function mostrarMensaje(tipo, texto) {
            const mensajeDiv = document.getElementById('mensaje');
            mensajeDiv.innerHTML = `
                <div class="alert ${tipo === 'error' ? 'alert-danger' : 'alert-success'} d-flex align-items-center" role="alert">
                    <i class="fas ${tipo === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'} me-2"></i>
                    <div>${texto}</div>
                </div>
            `;
        }
        
        // Función para cargar los datos del cliente
        function cargarDatosCliente(cedula) {
            fetch(`/clientes/${cedula}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Error al cargar los datos del cliente');
                    }
                    return response.json();
                })
                .then(cliente => {
                    // Mostrar información básica del cliente
                    document.getElementById('nombre').textContent = cliente.nombre;
                    
                    // Mostrar documentos
                    const tbody = document.getElementById('listaDocumentos');
                    tbody.innerHTML = '';
                    
                    // Definir los tipos de seguros con sus nombres y claves
                    const seguros = [
                        { 
                            nombre: 'Asistencia Médica', 
                            icon: 'fa-notes-medical',
                            claveContratado: 'contratado_asistenciaMedica', 
                            claveUrl: 'seguro_url_asistenciaMedica' 
                        },
                        { 
                            nombre: 'Seguro de Vida', 
                            icon: 'fa-heartbeat',
                            claveContratado: 'contratado_seguro_vida', 
                            claveUrl: 'seguro_url_vida' 
                        },
                        { 
                            nombre: 'Seguro Multihogar', 
                            icon: 'fa-home',
                            claveContratado: 'contratado_seguro_multihogar', 
                            claveUrl: 'seguro_url_multihogar' 
                        },
                        { 
                            nombre: 'Seguro de Vehículos', 
                            icon: 'fa-car',
                            claveContratado: 'contratado_seguro_vehiculos', 
                            claveUrl: 'seguro_url_vehiculos' 
                        },
                        { 
                            nombre: 'Seguro PYMES', 
                            icon: 'fa-building',
                            claveContratado: 'contratado_seguro_PYMES', 
                            claveUrl: 'seguro_url_PYMES' 
                        }
                    ];

                    seguros.forEach(seguro => {
                        const contratado = cliente[seguro.claveContratado];
                        const urlDocumento = cliente[seguro.claveUrl];
                        
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>
                                <div class="d-flex align-items-center">
                                    <i class="fas ${seguro.icon} me-2 seguro-icon"></i>
                                    ${seguro.nombre}
                                </div>
                            </td>
                            <td class="text-center">
                                <span class="badge ${contratado ? 'bg-success' : 'bg-secondary'}">
                                    ${contratado ? 'Contratado' : 'No contratado'}
                                </span>
                            </td>
                            <td class="text-center">
                                ${urlDocumento 
                                    ? `<a href="/static/${urlDocumento}" target="_blank" class="btn btn-document">
                                         <i class="fas fa-file-pdf me-2"></i>Ver documento
                                       </a>` 
                                    : '<span class="no-document"><i class="fas fa-times-circle me-1"></i>No disponible</span>'}
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                    mostrarMensaje('error', error.message);
                });
        }
    </script>
</body>
</html>

        position: absolute;

    }
