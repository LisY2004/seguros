<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Oswald&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
   
     <script src="cotizador.js" defer></script>

    <link rel="stylesheet" href="/Brocker/static/styles.css">
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const cedula = urlParams.get("cedula");
            if (cedula) {
                document.getElementById("cedula").value = cedula;
                fetch(`/clientes/${cedula}`)
                    .then(response => response.json())
                    .then(data => {
                        document.getElementById("nombre").value = data.nombre || "";
                        document.querySelector("[name='contratado_asistenciaMedica']").checked = data.contratado_asistenciaMedica;
                        document.querySelector("[name='contratado_seguro_vida']").checked = data.contratado_seguro_vida;
                        document.querySelector("[name='contratado_seguro_multihogar']").checked = data.contratado_seguro_multihogar;
                        document.querySelector("[name='contratado_seguro_vehiculos']").checked = data.contratado_seguro_vehiculos;
                        document.querySelector("[name='contratado_seguro_PYMES']").checked = data.contratado_seguro_PYMES;
                    })
                    .catch(error => console.error("Error al obtener datos del cliente", error));
            }
        });

        
    </script>
</head>
<body>

    <header>
        <div class="container">
            <div id="branding">
                <h1><span class="highlight">V </span>& </span>F </span>Seguros</h1>
            </div>
            <nav>
                <ul>
                    <li class="current"><a href="verClientes.html">Cliente</a></li>
                    <li><a href="inicioSecion.html">Cerrar Sesión</a></li>


                </ul>
            </nav>
        </div>
    </header>
    <h2>Editar Cliente</h2>
    <form id="clienteForm" enctype="multipart/form-data" >
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombres completos</label>
            <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ingrese sus nombres completos" required>
        </div>

            
        <div class="mb-3">
            <label for="cedula" class="form-label">Cédula de identidad: </label>
            <input type="text" class="form-control" id="cedula" name="cedula" placeholder="Ingrese su cédula de identidad" required>
        </div>
        <label><input type="checkbox" name="contratado_asistenciaMedica"> Asistencia Médica</label>
        <br>
        <label><input type="checkbox" name="contratado_seguro_vida"> Seguro de Vida</label>
        <br>
        <label><input type="checkbox" name="contratado_seguro_multihogar"> Seguro Multihogar</label>
        <br>
        <label><input type="checkbox" name="contratado_seguro_vehiculos"> Seguro Vehículos</label>
        <br>
        <label><input type="checkbox" name="contratado_seguro_PYMES"> Seguro PYMES</label>
        <br>
        <label for="seguro_asistenciaMedica">Archivo Asistencia Médica:</label>

        <div class="mb-3">
            <input type="file" class="form-control" id="seguro_asistenciaMedica" name="seguro_asistenciaMedica" multiple>
        </div>
        <label for="seguro_vida">Archivo Seguro de Vida:</label>
        <div class="mb-3">
            <input type="file" class="form-control" id="seguro_vida" name="seguro_vida" multiple>
        </div>
        <label for="seguro_multihogar">Archivo Seguro Multihogar:</label>
        <div class="mb-3">
            <input type="file" class="form-control" id="seguro_multihogar" name="seguro_multihogar" multiple>
        </div>
        
        <label for="seguro_vehiculos">Archivo Seguro Vehículos:</label>
        <div class="mb-3">
            <input type="file" class="form-control" id="seguro_vehiculos" name="seguro_vehiculos" multiple>
        </div>
        <label for="seguro_PYMES">Archivo Seguro PYMES:</label>
        <div class="mb-3">
            <input type="file" class="form-control" id="contratado_seguro_PYMES" name="seguro_PYMES" multiple>
        </div>
        <button type="button" onclick="actualizarCliente()">Actualizar Cliente</button>
    </form>
    <p id="mensaje"></p>
    <script>
        function actualizarCliente() {
            let cedula = document.getElementById("cedula").value;
            let formData = new FormData(document.getElementById("clienteForm"));
            
            fetch(`/clientes/${cedula}`, {
                method: "PUT",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("mensaje").innerText = data.message;
            })
            .catch(error => {
                document.getElementById("mensaje").innerText = "Error al actualizar cliente";
                console.error(error);
            });
        }
    </script>
</body>
</html>
