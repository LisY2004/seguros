<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Clientes</title>

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Oswald&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="/Brocker/static/styles.css">
</head>
<body>

    <header>
        <div class="container">
            <div id="branding">
                <h1><span class="highlight">V </span>& </span>F </span>Seguros</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="verClientes.html">Cliente</a></li>
                    <li class="current"><a href="inicioSecion.html">Cerrar Sesión</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="text-center mb-4">Lista de Clientes</h1>
                <div class="d-flex justify-content-end mb-4">
                    <button class="btn btn-crear" onclick="window.location.href='crear_cliente.html'">
                        <i class="fas fa-user-plus me-2"></i>Crear Nuevo Cliente
                    </button>
                </div>
            </div>
        </div>
        
        <div class="row mb-4">
            <div class="col-12">
                <div id="mensaje" class="alert-container"></div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-12">
                <div class="table-container">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Cédula</th>
                                <th>Nombre</th>
                                <th>Seguros Contratados</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="listaClientes">
                            <!-- Los clientes se cargarán aquí dinámicamente -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <script>
        // Cargar la lista de clientes al cargar la página
        document.addEventListener('DOMContentLoaded', cargarClientes);

        // Función para cargar los clientes desde la API
        function cargarClientes() {
            fetch('/clientes/')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Error al cargar los clientes');
                    }
                    return response.json();
                })
                .then(clientes => {
                    const tbody = document.getElementById('listaClientes');
                    tbody.innerHTML = '';

                    if (clientes.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" class="no-clients">No hay clientes registrados</td></tr>';
                        return;
                    }

                    clientes.forEach(cliente => {
                        // Obtener los seguros contratados
                        const segurosContratados = ['asistenciaMedica', 'seguro_vida', 'seguro_multihogar', 'seguro_vehiculos', 'seguro_PYMES']
                            .filter(seguro => cliente[`contratado_${seguro}`])
                            .map(seguro => {
                                // Convertir el nombre del seguro a un formato más legible
                                switch(seguro) {
                                    case 'asistenciaMedica': return 'Asistencia Médica';
                                    case 'seguro_vida': return 'Seguro de Vida';
                                    case 'seguro_multihogar': return 'Multihogar';
                                    case 'seguro_vehiculos': return 'Vehículos';
                                    case 'seguro_PYMES': return 'PYMES';
                                    default: return seguro;
                                }
                            })
                            .join(', ');

                        // Crear la fila de la tabla
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${cliente.cedula}</td>
                            <td>${cliente.nombre}</td>
                            <td>${segurosContratados || 'Ninguno'}</td>
                            <td class="text-center">
                                <button class="btn btn-action btn-edit" onclick="editarCliente('${cliente.cedula}')">
                                    <i class="fas fa-edit me-1"></i>Editar
                                </button>
                                <button class="btn btn-action btn-delete" onclick="eliminarCliente('${cliente.cedula}')">
                                    <i class="fas fa-trash-alt me-1"></i>Eliminar
                                </button>
                                <button class="btn btn-action btn-view" onclick="verDocumentos('${cliente.cedula}')">
                                    <i class="fas fa-file-alt me-1"></i>Ver Documentos
                                </button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                    mostrarMensaje('error', error.message);
                });
        }

        // Función para mostrar mensajes
        function mostrarMensaje(tipo, texto) {
            const mensajeDiv = document.getElementById('mensaje');
            mensajeDiv.innerHTML = `
                <div class="alert ${tipo === 'error' ? 'alert-danger' : 'alert-success'} d-flex align-items-center" role="alert">
                    <i class="fas ${tipo === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'} me-2"></i>
                    <div>${texto}</div>
                </div>
            `;
            
            // Auto-ocultar el mensaje después de 5 segundos
            setTimeout(() => {
                mensajeDiv.innerHTML = '';
            }, 5000);
        }

        // Función para eliminar un cliente
        function eliminarCliente(cedula) {
            if (confirm(`¿Está seguro de eliminar al cliente con cédula ${cedula}?`)) {
                fetch(`/clientes/${cedula}`, {
                    method: 'DELETE'
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Error al eliminar el cliente');
                    }
                    return response.json();
                })
                .then(data => {
                    mostrarMensaje('success', 'Cliente eliminado correctamente');
                    cargarClientes(); // Recargar la lista
                })
                .catch(error => {
                    console.error('Error:', error);
                    mostrarMensaje('error', error.message);
                });
            }
        }

        // Función para redireccionar a la página de edición
        function editarCliente(cedula) {
            window.location.href = `editar_cliente.html?cedula=${cedula}`;
        }

        // Función para ver los documentos de un cliente
        function verDocumentos(cedula) {
            window.location.href = `documentos_cliente.html?cedula=${cedula}`;
        }
    </script>
</body>
</html>
