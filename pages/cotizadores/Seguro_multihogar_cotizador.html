<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador - V & F Seguros</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Oswald&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   <script src="/assetes/js/cotizador.js"></script>
    <link rel="stylesheet" href="/assetes/css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div id="branding" style="display: flex; align-items: center;">
                <img  width="20%" src="/assetes/img/logo3.png" alt="V & F Seguros Logo">
                <h1 style="margin-right: 10px;"><span class="highlight">V </span>& F Seguros de Multihogar</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="/index.html">Inicio</a></li>
                    <li><a href="/pages/trayectoria.html">Trayectoria</a></li>
                    <li class="current"><a href="/pages/seguros.html">Seguros</a></li>
                    <li><a href="/pages/siniestros.html">Siniestros</a></li>

                    <li><a href="/pages/contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="main">
        <div style="display: flex; justify-content: center;" class="container">
            <article id="main-col">
                <form id="cotizador-form">

                    <h3 style="text-align: center;">Datos Personales</h3>
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombres Completos:</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ingrese sus nombres completos" required>
                    </div>
                    <div class="mb-3">
                        <label for="cedula" class="form-label">Cédula de identidad:</label>
                        <input type="text" class="form-control" id="cedula" name="cedula" placeholder="Ingrese su número de cédula" onkeypress="return isNumber(event)" required>
                    </div>
                    <div class="mb-3">
                        <label for="fecha_nacimiento" class="form-label">Fecha de Nacimiento:</label>
                        <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento" required>
                    </div>
                    <div class="mb-3">
                        <label for="genero" class="form-label">Género:</label>
                        <select class="form-control" id="genero" name="genero" required>
                            <option value="">Seleccione</option>
                            <option value="hombre">Hombre</option>
                            <option value="mujer">Mujer</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="estado_civil" class="form-label">Estado Civil:</label>
                        <select class="form-control" id="estado_civil" name="estado_civil" required>
                            <option value="">Seleccione</option>
                            <option value="soltero">Soltero</option>
                            <option value="casado">Casado</option>
                            <option value="divorciado">Divorciado</option>
                            <option value="union_libre">Unión Libre</option>
                            <option value="viudo">Viudo</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="correo" class="form-label">Correo Electrónico:</label>
                        <input type="email" class="form-control" id="correo" name="correo" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="telefono" class="form-label">Teléfono/WhatsApp:</label>
                        <input type="text" class="form-control" id="telefono" name="telefono" placeholder="Ingrese su número de contacto" onkeypress="return isNumber(event)" required>
                    </div>

                    <button type="submit" class="vintage-button" onclick="enviarCorreo_Multihogar()">Enviar</button>

                </form>

                
            </article>

        </div>
    </section>
 <!-- Círculos de ayuda en la parte inferior -->
 <div id="footer-container"></div>



    <footer>
        <p>&copy; 2025 VirtusNexus. Todos los derechos reservados.</p>
    </footer>

    <script src="/assetes/js/cotizador.js"></script>
</body>
</html>
